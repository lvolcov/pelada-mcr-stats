# Pelada MCR Stats — full stack.
# Edit ./data/matches.csv to refresh the site (read on next request).

services:
  backend:
    build: ./backend
    container_name: pelada-backend
    restart: unless-stopped
    environment:
      MATCHES_PATH: /data/matches.csv
    volumes:
      # Read-only mount of the data folder — edit the CSVs here to update.
      - ./data:/data:ro
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: pelada-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Host port 8095 -> nginx :80. Visit http://localhost:8095
      - "8095:80"
