<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Pelada MCR · Stats</title>
    <!--
      GitHub Pages SPA fallback (rafgraph/spa-github-pages). Pages serves this file
      for unknown paths; it rewrites the URL into a query string and bounces to
      index.html, which restores the real route. pathSegmentsToKeep=1 keeps the
      project-page prefix (/<repo>/).
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
